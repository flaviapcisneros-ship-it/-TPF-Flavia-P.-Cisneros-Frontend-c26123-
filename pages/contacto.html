<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../css/styles.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <title>Document</title>
  </head>
  <body>
    <header>
      <div class="div-logo">
        <a class="logo" href="../index.html">
          <img
            src="../img/Murder-Drones-Logo-PNG-1.png"
            alt="Murder Drones Store"
        /></a>
      </div>

      <nav class="header-nav">
        <ul>
          <li>
            <a href="../index.html">Home</a>
          </li>
          <li>
            <a href="../pages/contacto.html">Contacto</a>
          </li>
        </ul>
      </nav>
    </header>
    <main>
      <h1 class="titulo-contacto text-secondary">Dejanos tu mensaje</h1>

      <form
        class="form-contacto"
        action="https://formspree.io/f/mjgllqdy"
        method="POST"
      >
        <div class="grupo-input">
          <label for="email"> Your email: </label>
          <input id="email" type="email" name="email" />
        </div>
        <div class="grupo-input">
          <label for="mensaje"> Your message: </label>
          <textarea id="mensaje" name="message"></textarea>
        </div>
        <!-- your other form fields go here -->
        <button class="btn" type="submit">Send</button>
      </form>
    </main>
    <footer>
      <p>Sitio realizado por Fla para Talento Tech</p>
      <nav>
        <ul class="footer-list">
          <li><img src="../img/instagram.png" alt="logo de instagram" /></li>
          <li><img src="../img/whatsapp.png" alt="logo de whatsapp" /></li>
        </ul>
      </nav>
    </footer>
  </body>
</html>
